<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker Blinds Timer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">

      <button id="btn-edit-config" title="Edit blind levels">⚙</button>

      <header>
        <h1>Poker Blinds Timer</h1>
        <div class="session-info">
          Game <span id="game-number">1</span>
          &nbsp;&bull;&nbsp;
          Round <span id="round-number">1</span> of <span id="total-rounds">6</span>
        </div>
      </header>

      <main>
        <section class="timer-section">

          <div class="clock-wrapper">
            <svg class="clock-svg" viewBox="0 0 200 200" aria-hidden="true">
              <circle class="clock-track"    cx="100" cy="100" r="85"/>
              <circle class="clock-progress" cx="100" cy="100" r="85" id="clock-progress"/>
            </svg>
            <div class="clock-inner">
              <div class="clock-label">Current Blinds</div>
              <div class="clock-blinds">
                <span id="small-blind">50</span><span class="slash">/</span><span id="big-blind">100</span>
              </div>
              <div class="clock-label">Time Remaining</div>
              <div id="countdown">20:00</div>
              <div class="next-blinds" id="next-blinds">
                Next: <span id="next-small">100</span>/<span id="next-big">200</span>
              </div>
              <div class="controls">
                <button id="btn-start-pause" class="full-width">Start</button>
                <button id="btn-prev">←</button>
                <button id="btn-reset">New Game</button>
                <button id="btn-next">→</button>
              </div>
            </div>
          </div>

        </section>
      </main>

      <!-- Settings overlay (hidden by default) -->
      <div id="settings-overlay" hidden>
        <div class="settings-panel">
          <div class="settings-header">
            <span class="section-title">Blind Levels</span>
            <button id="btn-cancel-config">✕</button>
          </div>
          <table class="rounds-table edit-table">
            <thead>
              <tr><th>#</th><th>Small</th><th>Big</th><th>Min</th><th></th></tr>
            </thead>
            <tbody id="edit-tbody"></tbody>
          </table>
          <button id="btn-add-level">+ Add Level</button>
          <div class="voice-row">
            <label for="voice-select">Voice</label>
            <select id="voice-select"></select>
            <button id="btn-voice-preview" title="Preview voice">▶</button>
          </div>
          <div class="edit-footer">
            <button id="btn-reset-config">Defaults</button>
            <button id="btn-save-config">Save</button>
          </div>
        </div>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
