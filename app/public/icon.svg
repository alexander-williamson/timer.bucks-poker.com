<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <circle cx="96" cy="96" r="96" fill="#1a4a1c"/>
  <!-- Clock ring track -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>
  <!-- Clock ring progress -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#4caf50" stroke-width="8"
          stroke-dasharray="452" stroke-dashoffset="113"
          stroke-linecap="round" transform="rotate(-90 96 96)"/>
  <!-- Chip-style inner circle -->
  <circle cx="96" cy="96" r="52" fill="#0d2e0e"/>
  <!-- "BT" text -->
  <text x="96" y="107" font-family="system-ui, sans-serif" font-size="36" font-weight="700"
        fill="#f5d87a" text-anchor="middle" letter-spacing="2">BT</text>
</svg>
